name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write       # needed to create GitHub release
  packages: write       # reserved for future OCI/ghcr publishing

jobs:
  release:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Final sanity gate: don't cut a release with a broken tree.
      - name: go test
        run: go test -count=1 -timeout 60s ./...

      - name: goreleaser release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: set this repo secret to enable Homebrew tap push.
          # Without it, goreleaser logs a warning and skips the brew step.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # CHANGELOG.md is maintained by release-please — it's already up
      # to date in the commit this tag points at (the release PR merge
      # that created the tag). No regeneration step needed here.
