# Dependabot config — weekly bumps for Go modules + GitHub Actions.
# Commit prefixes match our Conventional-Commit rules so the commit-msg
# hook and release-please both accept them without a manual retitle.
#
# Minor + patch bumps are grouped into one PR per ecosystem per week to
# keep review load predictable. Major bumps open individually so they
# get proper attention.
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: UTC
    open-pull-requests-limit: 10
    # `prefix: chore` + `include: scope` produces canonical
    # `chore(deps): …` messages. A prefix that already contains parens
    # (e.g. `chore(ci)`) makes dependabot generate `chore(ci)(deps): …`,
    # which is technically valid Conventional Commits with our relaxed
    # regex but uglier than necessary.
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
      - go
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: UTC
    open-pull-requests-limit: 5
    # See note above re: `chore` (without parens) keeps the
    # generated message canonical.
    commit-message:
      prefix: "chore"
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
