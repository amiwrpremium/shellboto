# git-chglog config — drives `make changelog`.
#
# Docs: https://github.com/git-chglog/git-chglog

style: github
template: CHANGELOG.tpl.md
info:
  title: CHANGELOG
  repository_url: https://github.com/amiwrpremium/shellboto

options:
  commits:
    filters:
      Type:
        - feat
        - fix
        - perf
        - refactor
        - docs
        - test
        - build
        - ci
        - chore
        - revert
  commit_groups:
    title_maps:
      feat: Features
      fix: Bug fixes
      perf: Performance
      refactor: Refactors
      docs: Documentation
      test: Tests
      build: Build
      ci: CI
      chore: Chores
      revert: Reverts
  header:
    pattern: "^(\\w*)(?:\\(([\\w\\$\\.\\-\\*\\s]*)\\))?(\\!)?:\\s(.*)$"
    pattern_maps:
      - Type
      - Scope
      - Breaking
      - Subject
  notes:
    keywords:
      - BREAKING CHANGE
      - BREAKING-CHANGE
